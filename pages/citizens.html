<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizens | Smart Waste Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4f7fc;
}

.card{
    border:none;
    border-radius:15px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.avatar{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#0d6efd;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    margin:auto;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">
👥 Citizens Dashboard
</h2>

<div class="row g-4">

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<div class="avatar">
<i class="bi bi-person"></i>
</div>

<h4 class="mt-3">Rahul Sharma</h4>

<p>Ward 12</p>

<button class="btn btn-success w-100">
Report Full Bin
</button>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4">

<h5>Complaint Status</h5>

<ul class="list-group">

<li class="list-group-item">
Overflowing Bin
<span class="badge bg-warning float-end">
Pending
</span>
</li>

<li class="list-group-item">
Garbage Collected
<span class="badge bg-success float-end">
Completed
</span>
</li>

</ul>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4">

<h5>Nearby Smart Bins</h5>

<table class="table">

<tr>
<th>Bin</th>
<th>Status</th>
</tr>

<tr>
<td>BIN001</td>
<td>
<span class="badge bg-danger">Full</span>
</td>
</tr>

<tr>
<td>BIN002</td>
<td>
<span class="badge bg-success">Normal</span>
</td>
</tr>

<tr>
<td>BIN003</td>
<td>
<span class="badge bg-warning">Medium</span>
</td>
</tr>

</table>

</div>

</div>

</div>

</div>

</body>

</html>
