<!-- ==========================================
            CITIZEN MANAGEMENT
========================================== -->

<div class="dashboard-card">

    <div class="card-header">
        <h3>👥 Citizen Complaints</h3>
    </div>

    <div class="row">

        <div class="col-md-5">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" id="citizenName" class="form-control">
            </div>

            <div class="mb-3">
                <label>Complaint</label>
                <textarea id="citizenComplaint" class="form-control"></textarea>
            </div>

            <button class="primary-btn" onclick="submitComplaint()">
                Submit Complaint
            </button>

        </div>

        <div class="col-md-7">

            <h5>Recent Complaints</h5>

            <div id="complaintList"></div>

        </div>

    </div>

</div>
