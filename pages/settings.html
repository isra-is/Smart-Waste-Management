<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | Smart Waste Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4f7fc;
}

.card{
    border:none;
    border-radius:15px;
}

.setting-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 0;
    border-bottom:1px solid #ddd;
}

.setting-item:last-child{
    border-bottom:none;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">
⚙ Settings
</h2>

<div class="card shadow p-4">

<div class="setting-item">
<div>
<h5>👤 Profile</h5>
<p class="text-muted">Update your personal information</p>
</div>
<button class="btn btn-primary">Edit</button>
</div>

<div class="setting-item">
<div>
<h5>🔑 Change Password</h5>
<p class="text-muted">Keep your account secure</p>
</div>
<button class="btn btn-warning">Change</button>
</div>

<div class="setting-item">
<div>
<h5>🔔 Notifications</h5>
<p class="text-muted">Enable or disable notifications</p>
</div>
<div class="form-check form-switch">
<input class="form-check-input" type="checkbox" checked>
</div>
</div>

<div class="setting-item">
<div>
<h5>🌙 Dark Mode</h5>
<p class="text-muted">Switch appearance</p>
</div>
<div class="form-check form-switch">
<input class="form-check-input" type="checkbox">
</div>
</div>

<div class="setting-item">
<div>
<h5>🌐 Language</h5>
<p class="text-muted">Choose your preferred language</p>
</div>

<select class="form-select w-auto">
<option selected>English</option>
<option>Hindi</option>
</select>

</div>

<div class="setting-item">
<div>
<h5>🚪 Logout</h5>
<p class="text-muted">Sign out of your account</p>
</div>
<button class="btn btn-danger">Logout</button>
</div>

</div>

</div>

</body>

</html>
