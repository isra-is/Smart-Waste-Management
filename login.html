<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Waste Management | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">

        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                Smart Waste
            </a>

        </div>

    </nav>

    <!-- Login Section -->

    <section class="login-section py-5">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-5 col-md-7">

                    <div class="card shadow-lg border-0 rounded-4">

                        <div class="card-body p-5">

                            <div class="text-center mb-4">

                                <i class="bi bi-person-circle display-3 text-success"></i>

                                <h2 class="mt-3 fw-bold">
                                    Welcome Back
                                </h2>

                                <p class="text-muted">
                                    Login to your Smart Waste account
                                </p>

                            </div>

                            <form onsubmit="loginUser(event)">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Username
                                    </label>

                                    <input
    type="text"
    class="form-control"
    id="username"
    placeholder="Enter username"
    required>

                                </div>

                                <div class="mb-4">

                                    <label class="form-label">
                                        Password
                                    </label>

                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        placeholder="Enter password"
                                        required>

                                </div>
                                                                <div class="d-flex justify-content-between align-items-center mb-4">

                                    <div class="form-check">

                                        <input
                                            class="form-check-input"
                                            type="checkbox"
                                            id="rememberMe">

                                        <label class="form-check-label" for="rememberMe">
                                            Remember Me
                                        </label>

                                    </div>

                                    <a href="#" class="text-success text-decoration-none">
                                        Forgot Password?
                                    </a>

                                </div>

                                <div class="d-grid mb-3">

                                    <button
                                        type="submit"
                                        class="btn btn-success btn-lg">

                                        <i class="bi bi-box-arrow-in-right"></i>
                                        Login

                                    </button>

                                </div>

                            </form>

                            <hr>

                            <p class="text-center mb-0">

                                Don't have an account?

                                <a href="register.html"
                                    class="text-success fw-bold text-decoration-none">

                                    Register Here

                                </a>

                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="bg-dark text-white text-center py-3">

        <p class="mb-0">
            © 2026 Smart Waste Management System | Developed by Isra
        </p>

    </footer>
        <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script src="js/script.js"></script>
<script src="js/auth.js"></script>

<script>
window.onload = function () {

    const role = localStorage.getItem("role");

    if (!role) {
        alert("Please select role from homepage first");
        window.location.href = "index.html";
    }

};
</script>

</body>

</html>
