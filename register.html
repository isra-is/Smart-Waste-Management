<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Waste Management | Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">

        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                Smart Waste
            </a>

        </div>

    </nav>

    <!-- Register Section -->

    <section class="py-5">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-7">

                    <div class="card shadow-lg border-0 rounded-4">

                        <div class="card-body p-5">

                            <div class="text-center mb-4">

                                <i class="bi bi-person-plus-fill display-3 text-success"></i>

                                <h2 class="fw-bold mt-3">
                                    Create Your Account
                                </h2>

                                <p class="text-muted">
                                    Join the Smart Waste Management System
                                </p>

                            </div>

                            <form onsubmit="registerUser(event)">

                                <div class="row">

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                            Full Name
                                        </label>

                                        <input
                                            type="text"
                                            class="form-control"
                                            id="name"
                                            placeholder="Enter your full name"
                                            required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                            Email
                                        </label>

                                        <input
                                            type="email"
                                            class="form-control"
                                            id="email"
                                            placeholder="Enter your email"
                                            required>

                                    </div>

                                </div>

                                <div class="row">

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                            Phone Number
                                        </label>

                                        <input
                                            type="tel"
                                            class="form-control"
                                            id="phone"
                                            placeholder="Enter phone number"
                                            required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                            Address
                                        </label>

                                        <input
                                            type="text"
                                            class="form-control"
                                            id="address"
                                            placeholder="Enter address"
                                            required>

                                    </div>

                                </div>
                                                                <div class="row">

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                            Password
                                        </label>

                                        <input
                                            type="password"
                                            class="form-control"
                                            id="password"
                                            placeholder="Create a password"
                                            required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                            Confirm Password
                                        </label>

                                        <input
                                            type="password"
                                            class="form-control"
                                            id="confirmPassword"
                                            placeholder="Confirm your password"
                                            required>

                                    </div>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Register As
                                    </label>

                                    <select
                                        class="form-select"
                                        id="role"
                                        required>

                                        <option value="" selected disabled>
                                            Select User Type
                                        </option>

                                        <option value="citizen">
                                            Citizen
                                        </option>

                                        <option value="driver">
                                            Garbage Collection Driver
                                        </option>

                                        <option value="admin">
                                            Administrator
                                        </option>

                                    </select>

                                </div>

                                <div class="form-check mb-4">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        id="terms"
                                        required>

                                    <label
                                        class="form-check-label"
                                        for="terms">

                                        I agree to the Terms &
                                        Conditions and Privacy Policy.

                                    </label>

                                </div>

                                <div class="d-grid">

                                    <button
                                        type="submit"
                                        class="btn btn-success btn-lg">

                                        <i class="bi bi-person-check-fill"></i>
                                        Create Account

                                    </button>

                                </div>

                            </form>
                                                        <hr>

                            <p class="text-center mb-0">

                                Already have an account?

                                <a href="login.html"
                                   class="text-success fw-bold text-decoration-none">

                                    Login Here

                                </a>

                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="bg-dark text-white text-center py-3">

        <p class="mb-0">
            © 2026 Smart Waste Management System | Developed by Isra
        </p>

    </footer>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->

    <script src="js/script.js"></script>
<script src="js/auth.js"></script>

</body>

</html>
